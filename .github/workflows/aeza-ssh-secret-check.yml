name: Aeza SSH secret check

on:
  push:
    paths:
      - ".github/workflows/aeza-ssh-secret-check.yml"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check SSH login to Aeza VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 30s
          command_timeout: 2m
          script: |
            echo SSH_OK
            hostname
            whoami
            uname -a

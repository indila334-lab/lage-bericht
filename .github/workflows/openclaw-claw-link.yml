name: OpenClaw Claw Link

on:
  workflow_dispatch:

jobs:
  openclaw:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Diagnose OpenClaw on Aeza
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 30s
          command_timeout: 8m
          script: |
            set +e
            echo "SSH_OK"
            whoami
            hostname
            echo "PATH=$PATH"
            echo "--- openclaw command ---"
            command -v openclaw
            openclaw --version
            echo "--- /root/openclaw.txt ---"
            cat /root/openclaw.txt
            echo "--- /root files ---"
            ls -la /root
            echo "--- likely commands ---"
            ls -la /usr/local/bin /usr/bin /opt 2>/dev/null | grep -i claw
            echo "--- services ---"
            systemctl list-units --type=service --all | grep -Ei 'claw|open' || true
            echo "--- docker ---"
            docker ps -a || true
            echo "--- ports ---"
            ss -lntp | grep -E '8000|18789' || true

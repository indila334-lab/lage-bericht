name: OpenClaw Claw Link

on:
  workflow_dispatch:

jobs:
  openclaw:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install Claw Link and start gateway
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 30s
          command_timeout: 8m
          script: |
            set -e

            echo "Installing Claw Link..."
            openclaw plugins install @imlls/claw-link

            echo "Starting OpenClaw gateway..."
            pkill -f "openclaw gateway" || true
            nohup openclaw gateway --force > /root/openclaw-gateway.log 2>&1 &

            sleep 10

            echo "Gateway log:"
            cat /root/openclaw-gateway.log || true

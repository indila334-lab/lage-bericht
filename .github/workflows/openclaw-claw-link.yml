name: OpenClaw Claw Link

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/openclaw-claw-link.yml"

jobs:
  openclaw:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Diagnose OpenClaw on Aeza
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 30s
          command_timeout: 8m
          script: |
            set +e
            echo "SSH_OK"
            whoami || true
            hostname || true
            echo "PATH=$PATH"
            echo "--- openclaw command ---"
            command -v openclaw || true
            openclaw --version || true
            echo "--- /root/openclaw.txt ---"
            cat /root/openclaw.txt || true
            echo "--- /root files ---"
            ls -la /root || true
            echo "--- likely commands ---"
            ls -la /usr/local/bin /usr/bin /opt 2>/dev/null | grep -i claw || true
            echo "--- services ---"
            systemctl list-units --type=service --all 2>/dev/null | grep -Ei 'claw|open' || true
            echo "--- docker ---"
            docker ps -a 2>/dev/null || true
            echo "--- ports ---"
            ss -lntp 2>/dev/null | grep -E '8000|18789' || true
            echo "DIAG_DONE"
            exit 0

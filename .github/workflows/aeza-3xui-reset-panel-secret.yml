name: Aeza 3x-ui reset panel secret

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Reset 3x-ui panel login without printing password
        uses: appleboy/ssh-action@v1.0.3
        env:
          PANEL_SECRET: ${{ secrets.VPS_PASSWORD }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 30s
          command_timeout: 5m
          envs: PANEL_SECRET
          script: |
            set -e
            XUI=/usr/local/x-ui/x-ui
            if [ ! -x "$XUI" ]; then
              XUI=$(command -v x-ui)
            fi
            "$XUI" setting -username marina -password "$PANEL_SECRET" -port 13497 -webBasePath marina-panel
            "$XUI" setting -listenIP 0.0.0.0 || true
            if command -v ufw >/dev/null 2>&1; then
              ufw allow 2053/tcp || true
              ufw reload || true
            fi
            systemctl restart x-ui || systemctl start x-ui
            echo DONE_RESET_PANEL_LOGIN
            echo PANEL_URL=http://91.184.242.59:2053/marina-panel
            echo PANEL_USER=marina
            echo PANEL_PASSWORD_IS_THE_SAME_AS_YOUR_AEZA_ROOT_PASSWORD_SECRET

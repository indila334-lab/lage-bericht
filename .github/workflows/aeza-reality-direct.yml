name: Aeza Reality direct

on:
  workflow_dispatch:

jobs:
  reality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Install Xray Reality and print Hiddify link
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 30s
          command_timeout: 15m
          script: |
            set -e

            export DEBIAN_FRONTEND=noninteractive

            apt-get update
            apt-get install -y curl unzip openssl ca-certificates

            if ! command -v xray >/dev/null 2>&1; then
              bash -c "$(curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh)" @ install
            fi

            UUID=$(xray uuid)
            KEYS=$(xray x25519)
            PRIVATE_KEY=$(printf "%s\n" "$KEYS" | awk '/Private key:/ {print $3}')
            PUBLIC_KEY=$(printf "%s\n" "$KEYS" | awk '/Public key:/ {print $3}')
            SHORT_ID=$(openssl rand -hex 8)

            mkdir -p /usr/local/etc/xray

            cat > /usr/local/etc/xray/config.json <<EOF
            {
              "log": {
                "loglevel": "warning"
              },
              "inbounds": [
                {
                  "tag": "vless-reality",
                  "listen": "0.0.0.0",
                  "port": 8443,
                  "protocol": "vless",
                  "settings": {
                    "clients": [
                      {
                        "id": "${UUID}",
                        "flow": "xtls-rprx-vision"
                      }
                    ],
                    "decryption": "none"
                  },
                  "streamSettings": {
                    "network": "tcp",
                    "security": "reality",
                    "realitySettings": {
                      "show": false,
                      "dest": "www.microsoft.com:443",
                      "xver": 0,
                      "serverNames": [
                        "www.microsoft.com"
                      ],
                      "privateKey": "${PRIVATE_KEY}",
                      "shortIds": [
                        "${SHORT_ID}"
                      ]
                    }
                  }
                }
              ],
              "outbounds": [
                {
                  "protocol": "freedom",
                  "tag": "direct"
                }
              ]
            }
            EOF

            if command -v ufw >/dev/null 2>&1; then
              ufw allow 8443/tcp || true
              ufw reload || true
            fi

            iptables -I INPUT -p tcp --dport 8443 -j ACCEPT 2>/dev/null || true

            systemctl enable xray
            systemctl restart xray

            sleep 2
            systemctl is-active xray

            LINK="vless://${UUID}@91.184.242.59:8443?type=tcp&security=reality&pbk=${PUBLIC_KEY}&fp=chrome&sni=www.microsoft.com&sid=${SHORT_ID}&spx=%2F&flow=xtls-rprx-vision#Marina-Aeza-Reality"

            echo "========== HIDDIFY_LINK_START =========="
            echo "$LINK"
            echo "========== HIDDIFY_LINK_END =========="

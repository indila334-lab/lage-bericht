name: Aeza SSH probe

on:
  push:
    paths:
      - ".github/workflows/aeza-ssh-probe.yml"
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Probe TCP port 22 to Aeza VPS
        run: |
          set -e
          HOST="91.184.242.59"
          PORT="22"
          echo "Testing TCP connection to ${HOST}:${PORT} from GitHub Actions"
          timeout 15 bash -c "cat < /dev/null > /dev/tcp/${HOST}/${PORT}"
          echo "OK: port is reachable from GitHub Actions"
